kind = "web"
previewPath = "/"
title = "Travel Blog"
version = "1.0.0"
id = "artifacts/travel-blog"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24285

[services.development]
run = "pnpm --filter @workspace/travel-blog run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/travel-blog", "run", "build" ]
publicDir = "artifacts/travel-blog/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24285"
BASE_PATH = "/"
