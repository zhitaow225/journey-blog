<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>旅途 · Journey</title>

    <!-- PWA Meta Tags -->
    <meta name="application-name" content="旅途" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="旅途" />
    <meta name="description" content="A quiet space for unhurried journeys — minimalist travel journal" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#FAFAFA" />
    <meta name="msapplication-TileColor" content="#FAFAFA" />
    <meta name="msapplication-tap-highlight" content="no" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="icon.svg" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />

    <!-- GitHub Pages SPA 路由还原（配合 public/404.html 使用） -->
    <script>
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            });
          // 保留 base 路径（如 /仓库名），避免丢失子路径前缀
          var base = l.pathname.replace(/\/$/, "");
          window.history.replaceState(
            null,
            null,
            base + decoded[0] + (decoded[1] ? "?" + decoded[1] : "") + l.hash
          );
        }
      })(window.location);
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
